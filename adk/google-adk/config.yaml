# Memorii HealthTech - Google ADK Configuration
adk:
  version: "1.0.0"
  project_name: "Memorii HealthTech"
  description: "AI-Powered Agent System for Alzheimer's Care"
  
  # Google AI Configuration
  google_ai:
    project_id: "your-gcp-project-id"
    location: "us-central1"
    model: "gemini-2.0-flash-exp"
    temperature: 0.7
    max_tokens: 1024
  
  # Agent Registry
  agents:
    supervision:
      name: "supervision_agent"
      enabled: true
      priority: 1
      description: "Central orchestrator and request router"
    
    memory:
      name: "memory_agent"
      enabled: true
      priority: 2
      description: "Manages patient info and relationships"
    
    task:
      name: "task_agent"
      enabled: true
      priority: 2
      description: "Handles reminders and schedules"
    
    health:
      name: "health_agent"
      enabled: true
      priority: 3
      description: "Monitors health and symptoms"
  
  # Database Configuration
  database:
    type: "postgresql"
    host: "localhost"
    port: 5432
    name: "memorii_db"
    pool_size: 10
  
  # API Settings
  api:
    host: "0.0.0.0"
    port: 8000
    cors_origins:
      - "http://localhost:3000"
      - "http://localhost:3001"
    enable_docs: true
  
  # Logging
  logging:
    level: "INFO"
    format: "json"
    file: "logs/adk.log"