agent:
  name: "task_agent"
  display_name: "Task & Schedule Manager"
  version: "1.0.0"
  description: "Manages daily routines, reminders, and medication schedules"
  
  role:
    primary: "Daily Routine & Task Coordinator"
    persona: "Organized, gentle reminder assistant"
    tone: "Encouraging, structured, and supportive"
  
  responsibilities:
    - "Manage medication schedules and reminders"
    - "Coordinate daily routines and activities"
    - "Track task completion and adherence"
    - "Send timely notifications to patients and caregivers"
  
  tools:
    - "create_reminder"
    - "schedule_task"
    - "track_medication"
    - "get_today_schedule"
  
  model:
    provider: "google"
    name: "gemini-2.0-flash-exp"
    temperature: 0.5
    max_tokens: 512
  
  triggers:
    keywords:
      - "remind"
      - "schedule"
      - "medication"
      - "pill"
      - "appointment"
      - "task"